<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Multiagent Research System</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #2563eb;
    }

    header p {
      color: #6b7280;
      margin-top: 6px;
      font-size: 0.95rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      padding: 32px;
      width: 100%;
      max-width: 760px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #2563eb; }

    button {
      padding: 12px 24px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }

    /* Steps */
    .steps {
      display: flex;
      justify-content: space-between;
      margin: 28px 0 0;
      gap: 8px;
    }

    .step {
      flex: 1;
      text-align: center;
      padding: 10px 6px;
      border-radius: 10px;
      background: #f1f5f9;
      font-size: 0.8rem;
      color: #94a3b8;
      transition: all 0.3s;
    }

    .step .icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }
    .step.active { background: #eff6ff; color: #2563eb; font-weight: 600; }
    .step.done { background: #f0fdf4; color: #16a34a; }

    /* Spinner */
    .spinner {
      display: none;
      margin: 24px auto 0;
      width: 36px; height: 36px;
      border: 4px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    #results { display: none; margin-top: 28px; }

    .result-section { margin-bottom: 20px; }

    .result-section h3 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .result-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 20px 24px;
      font-size: 0.92rem;
      line-height: 1.8;
      max-height: 420px;
      overflow-y: auto;
    }

    .result-box h1, .result-box h2, .result-box h3 {
      margin: 16px 0 6px;
      color: #1e3a5f;
      font-weight: 700;
    }
    .result-box h1 { font-size: 1.25rem; }
    .result-box h2 { font-size: 1.1rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; }
    .result-box h3 { font-size: 1rem; }

    .result-box p { margin: 6px 0; color: #374151; }

    .result-box ul, .result-box ol {
      padding-left: 20px;
      margin: 6px 0;
    }
    .result-box li { margin: 4px 0; color: #374151; }

    .result-box strong { color: #111827; }
    .result-box em { color: #4b5563; }

    .result-box code {
      background: #e8f0fe;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.85rem;
      font-family: monospace;
    }

    .result-box blockquote {
      border-left: 3px solid #2563eb;
      margin: 8px 0;
      padding: 4px 12px;
      color: #6b7280;
      background: #eff6ff;
      border-radius: 0 6px 6px 0;
    }

    .result-box hr { border: none; border-top: 1px solid #e2e8f0; margin: 12px 0; }

    .actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
    }

    #downloadBtn {
      background: #16a34a;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #downloadBtn:hover { background: #15803d; }

    .error-msg {
      color: #dc2626;
      font-size: 0.9rem;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <h1>🔬 Multiagent Research System</h1>
  <p>Enter a topic and let AI agents search, read, write, and critique a full report.</p>
</header>

<div class="card">
  <div class="input-row">
    <input type="text" id="topicInput" placeholder="e.g. Quantum Computing in 2025" />
    <button id="runBtn" onclick="runResearch()">Research</button>
  </div>

  <p class="error-msg" id="errorMsg"></p>

  <div class="steps" id="steps">
    <div class="step" id="step-search"><span class="icon">🔍</span>Search</div>
    <div class="step" id="step-reader"><span class="icon">📄</span>Reader</div>
    <div class="step" id="step-writer"><span class="icon">✍️</span>Writer</div>
    <div class="step" id="step-critic"><span class="icon">🧐</span>Critic</div>
  </div>

  <div class="spinner" id="spinner"></div>

  <div id="results">
    <div class="result-section">
      <h3>📋 Report</h3>
      <div class="result-box" id="reportBox"></div>
    </div>
    <div class="result-section">
      <h3>💬 Critic Feedback</h3>
      <div class="result-box" id="feedbackBox"></div>
    </div>
    <div class="actions">
      <button id="downloadBtn" onclick="downloadReport()">
        ⬇ Download PDF
      </button>
    </div>
  </div>
</div>

<script>
  let currentData = {};

  const stepIds = ["step-search", "step-reader", "step-writer", "step-critic"];

  function setStep(index) {
    stepIds.forEach((id, i) => {
      const el = document.getElementById(id);
      el.className = "step" + (i < index ? " done" : i === index ? " active" : "");
    });
  }

  async function runResearch() {
    const topic = document.getElementById("topicInput").value.trim();
    const errorMsg = document.getElementById("errorMsg");
    errorMsg.style.display = "none";

    if (!topic) { errorMsg.textContent = "Please enter a topic."; errorMsg.style.display = "block"; return; }

    document.getElementById("runBtn").disabled = true;
    document.getElementById("results").style.display = "none";
    document.getElementById("spinner").style.display = "block";

    // Animate steps while waiting
    let stepIndex = 0;
    setStep(0);
    const stepTimer = setInterval(() => {
      stepIndex = Math.min(stepIndex + 1, stepIds.length - 1);
      setStep(stepIndex);
    }, 8000);

    try {
      const res = await fetch("/research", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ topic })
      });

      clearInterval(stepTimer);
      stepIds.forEach(id => document.getElementById(id).className = "step done");

      if (!res.ok) { throw new Error((await res.json()).error || "Server error"); }

      const data = await res.json();
      currentData = { topic, ...data };

      document.getElementById("reportBox").innerHTML = marked.parse(data.report);
      document.getElementById("feedbackBox").innerHTML = marked.parse(data.feedback);
      document.getElementById("results").style.display = "block";

    } catch (err) {
      clearInterval(stepTimer);
      errorMsg.textContent = "Error: " + err.message;
      errorMsg.style.display = "block";
      stepIds.forEach(id => document.getElementById(id).className = "step");
    } finally {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("runBtn").disabled = false;
    }
  }

  async function downloadReport() {
    const res = await fetch("/download", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(currentData)
    });
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "research_report.pdf"; a.click();
    URL.revokeObjectURL(url);
  }

  document.getElementById("topicInput").addEventListener("keydown", e => {
    if (e.key === "Enter") runResearch();
  });
</script>

</body>
</html>
